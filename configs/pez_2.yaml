# PEZ-2: instruction-conditioned target embedding generation
#
# Used by: src/pez/instruction_conditioned.py
# Output: Tensor[prompt_length, 768] continuous CLIP-input embeddings
#         (same shape as PEZ-1's output; no vocabulary projection).
# Three-term loss:
#   L = L_source + lambda_instruction * L_instr + gamma_anchor * L_anchor
# where L_source is the same loss family as PEZ-1 (controllable via
# source_loss_type), L_instr is text-text CLIP cosine, and L_anchor
# is L2 to the warm-start initialization in soft-prompt space.

# ─── Source-preservation term (mirrors PEZ-1's loss) ─────────────
# Should match PEZ-1's loss_type for consistency. Both being "sds"
# is the project default.
source_loss_type: sds         # "sds" or "clip"
cfg_scale: 7.5                # only used when source_loss_type == "sds"
timestep_sampling: uniform    # only used when source_loss_type == "sds"

# ─── Instruction-following term (always text-text CLIP cosine) ───
# The instruction is text, not an image — SDS doesn't apply. Always
# CLIP-cosine on the instruction text encoding.
lambda_instruction: 1.0       # too low → no edit; too high → drift
                              # off source

# ─── Warm-start anchor term ──────────────────────────────────────
warm_start: true              # initialize soft_prompt = pez_1_embeddings.clone()
                              # (continuous identity copy, no vocab lookup)
gamma_anchor: 0.1             # too low → per-position drift breaks
                              # alignment; too high → no edit happens

# ─── Optimization ────────────────────────────────────────────────
# PEZ-2 is faster than PEZ-1 because warm-starting refines a near-
# correct solution. num_steps is a *cap* — pez_search's adaptive
# early stopping (movement-based; see src/pez/search.py) terminates
# sooner when the soft prompt converges. RESEARCH_PROPOSAL.md §3.2
# allows 300-800; we set the cap conservatively to bound worst-case
# cost in the (λ, γ) sweep.
num_steps: 600                # cap; bumped from 300 to 600 to give
                              # N=75 soft prompts room to converge.
                              # Adaptive early stopping in pez_search
                              # shortcircuits when convergence is
                              # detected.
learning_rate: 0.05           # lower than PEZ-1 since we're refining
# (No projection_every: continuous PEZ doesn't snap to vocabulary.)

# ─── Models ──────────────────────────────────────────────────────
# See configs/pez_1.yaml for the dim-matching rule. PEZ-2 uses CLIP
# only via the text-text instruction-similarity term (no image features
# needed here), but for cache-key consistency keep this in sync with
# pez_1.yaml's clip_model.
clip_model: laion/CLIP-ViT-H-14-laion2B-s32B-b79K

# ─── Caching ─────────────────────────────────────────────────────
# Hash key includes config + image + instruction + pez_1 embeddings
# hash (sha256 of tensor bytes) + null_text hash (when sds).
# Cached target embeddings are continuous tensors (.pt files).
cache_dir: cache/pez_target_prompts/
use_cache: true

# ─── Misc ────────────────────────────────────────────────────────
seed: 42
device: cuda
dtype: float16
