# PEZ-1: source-image inversion to continuous CLIP-input embeddings
#
# Used by: src/pez/source_inversion.py
# Algorithm: Wen et al. 2023 "Hard Prompts Made Easy" (PEZ) optimization
#            machinery, adapted from external/pez/optim_utils.py with
#            the straight-through vocabulary projection step REMOVED.
#            The soft prompt is the canonical output (no discrete
#            tokenization). See RESEARCH_PROPOSAL.md §3.1.
# Loss: pluggable — see loss_type below.
# Output: Tensor[prompt_length, 768] continuous embeddings.

# ─── Loss formulation ────────────────────────────────────────────
# "sds": CFG-aware score-distillation surrogate of "prompt + null-text
#        reconstruct the image under our pipeline." Project default.
#        Requires null_text_embedding to be passed at call time.
# "clip": vanilla PEZ — prompt-image CLIP cosine similarity.
#         Faster, single CLIP-text pass per step. Used as legacy /
#         warm-start / fallback.
loss_type: sds

# Used only when loss_type == "sds":
cfg_scale: 7.5                # classifier-free guidance scale
                              # higher → sharper gradient, riskier
                              # over-saturation (DreamFusion findings)

timestep_sampling: uniform_truncated   # "uniform" / "uniform_truncated" / "importance".
                                       # uniform_truncated drops edge timesteps
                                       # (t < 2% or > 98% of num_train_timesteps)
                                       # where SDS gradient is unstable —
                                       # DreamFusion (Poole et al. 2022) standard.
                                       # The recommended default for SDS-CFG.
                                       # importance biases toward mid-timesteps
                                       # via a triangular distribution; useful
                                       # when SDS noise is high.

# Number of DDIM denoising steps used in SDS rounds for both
# ddim_inversion and null_text_optimization. MUST match
# configs/edit.yaml's ddim.num_steps so the per-timestep null-text
# produced here has the same length the editing loop consumes —
# otherwise run_p2p_edit warns and falls back to default uncond,
# silently losing Mokady-style null-text inversion. Standard 50 is
# the v1 default everywhere.
ddim_num_steps: 50

# ─── Prompt structure ────────────────────────────────────────────
prompt_length: 75             # N positions in [N, 768]. The HARD MAX
                              # is 75 (CLIP context is 77; reserve 2
                              # for BOS+EOS). Going to the cap gives
                              # maximum capacity for multi-subject
                              # scenes where each subject needs ~10-15
                              # positions for clean per-subject
                              # specialization (proposal §3.2 detail-
                              # richness; cf. husky+chihuahua test).
                              # Lower values (15-30) are fine for
                              # single-subject scenes.
                              #
                              # REPLACE-mode (v1) maxes this — every
                              # position is source-detail capacity,
                              # no slot reservation. ADD-mode (future)
                              # will allocate Pez2Config.prompt_length_extra
                              # on top of this for free padding-init
                              # slots; PEZ-1's N stays the same.

# ─── Optimization ────────────────────────────────────────────────
num_steps: 3000               # PEZ optimization steps cap. More for
                              # larger N or sds (vs clip). Bumped
                              # from 1500 to 3000 for N=75 to give
                              # the larger soft prompt room to
                              # converge; adaptive early stopping in
                              # pez_search shortcircuits when the
                              # variable stops moving.
learning_rate: 0.1            # AdamW lr on the soft prompt

# ─── Round-0 (vanilla PEZ) regularization ────────────────────────
# Standard AdamW weight_decay; decays the soft prompt toward the
# origin in CLIP embedding space. Fine for round 0 (random init) —
# this is Wen-et-al's published default. NOT used for SDS rounds 1+;
# those use delta_weight_decay below via the residual parameterization
# P = c_anchor + Δ (proposal §3.1).
weight_decay: 0.1

# ─── Round-1+ (SDS-PEZ refinement) anchor strength ───────────────
# AdamW.weight_decay applied to Δ in the residual parameterization
# P = c_anchor + Δ where c_anchor is the previous round's output
# (frozen). Decaying Δ → 0 means decaying P → c_anchor. This:
#   1. Fixes the anti-anchoring default that pulls toward origin.
#   2. Bounds SDS-noise drift (variance saturates at lr·σ²/(2·δ_wd)
#      rather than growing linearly with steps).
#   3. Makes c_anchor a stable equilibrium of round r's optimization.
# Default 0.1 is a starting point; the research proposal (§8 Open
# Question 9) flags this for empirical sweep on a small test set.
delta_weight_decay: 0.1

batch_size: 1
# (No projection_every: continuous PEZ doesn't snap to vocabulary.)

# ─── Models ──────────────────────────────────────────────────────
# Must match SD's text-encoder dim or clip_similarity_loss errors on
# the cosine dot product. SD2.1-base uses OpenCLIP-H/14 (1024-dim) →
# laion/CLIP-ViT-H-14-laion2B-s32B-b79K. SD1.5 uses OpenAI CLIP-L/14
# (768-dim) → openai/clip-vit-large-patch14. This field is used for
# cache hashing only; the caller loads the model and supplies
# clip_image_features + text_projection to pez_invert_source.
clip_model: laion/CLIP-ViT-H-14-laion2B-s32B-b79K

# ─── Alternating-optimization rounds ─────────────────────────────
# R from RESEARCH_PROPOSAL.md §3.1. R=2 is the v1 baseline; R=1 and
# R=3 are cheap-to-run ablations.
num_rounds: 2

# ─── Caching ─────────────────────────────────────────────────────
# Hash key includes config + image bytes + round index. Intermediate
# (embeddings_r, N_r) tuples are cached so resume-on-crash is cheap.
# Cached embeddings are continuous tensors (.pt files), not strings.
cache_dir: cache/pez_source_prompts/
use_cache: true

# ─── Misc ────────────────────────────────────────────────────────
seed: 42
device: cuda
dtype: float16
