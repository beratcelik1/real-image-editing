# PEZ-1: source-image inversion to continuous CLIP-input embeddings
#
# Used by: src/pez/source_inversion.py
# Algorithm: Wen et al. 2023 "Hard Prompts Made Easy" (PEZ) optimization
#            machinery, adapted from external/pez/optim_utils.py with
#            the straight-through vocabulary projection step REMOVED.
#            The soft prompt is the canonical output (no discrete
#            tokenization). See RESEARCH_PROPOSAL.md §3.1.
# Loss: pluggable — see loss_type below.
# Output: Tensor[prompt_length, 768] continuous embeddings.

# ─── Loss formulation ────────────────────────────────────────────
# "sds": CFG-aware score-distillation surrogate of "prompt + null-text
#        reconstruct the image under our pipeline." Project default.
#        Requires null_text_embedding to be passed at call time.
# "clip": vanilla PEZ — prompt-image CLIP cosine similarity.
#         Faster, single CLIP-text pass per step. Used as legacy /
#         warm-start / fallback.
loss_type: sds

# Used only when loss_type == "sds":
cfg_scale: 7.5                # classifier-free guidance scale
                              # higher → sharper gradient, riskier
                              # over-saturation (DreamFusion findings)

timestep_sampling: uniform    # "uniform" or "importance" — focus on
                              # mid-timesteps where SDS signal is
                              # strongest. Implement uniform first.

# ─── Prompt structure ────────────────────────────────────────────
prompt_length: 15             # N positions in [N, 768]. Larger N →
                              # more detail capacity (see proposal
                              # §3.2 detail-richness). Recommended
                              # 12-20.
                              #
                              # REPLACE-mode (v1) maxes this — every
                              # position is source-detail capacity,
                              # no slot reservation. ADD-mode (future)
                              # will allocate Pez2Config.prompt_length_extra
                              # on top of this for free padding-init
                              # slots; PEZ-1's N stays the same.

# ─── Optimization ────────────────────────────────────────────────
num_steps: 1500               # PEZ optimization steps. More for
                              # larger N or sds (vs clip).
learning_rate: 0.1            # AdamW lr on the soft prompt
weight_decay: 0.1
batch_size: 1
# (No projection_every: continuous PEZ doesn't snap to vocabulary.)

# ─── Models ──────────────────────────────────────────────────────
# Must match SD's text-encoder dim or clip_similarity_loss errors on
# the cosine dot product. SD2.1-base uses OpenCLIP-H/14 (1024-dim) →
# laion/CLIP-ViT-H-14-laion2B-s32B-b79K. SD1.5 uses OpenAI CLIP-L/14
# (768-dim) → openai/clip-vit-large-patch14. This field is used for
# cache hashing only; the caller loads the model and supplies
# clip_image_features + text_projection to pez_invert_source.
clip_model: laion/CLIP-ViT-H-14-laion2B-s32B-b79K

# ─── Alternating-optimization rounds ─────────────────────────────
# R from RESEARCH_PROPOSAL.md §3.1. R=2 is the v1 baseline; R=1 and
# R=3 are cheap-to-run ablations.
num_rounds: 2

# ─── Caching ─────────────────────────────────────────────────────
# Hash key includes config + image bytes + round index. Intermediate
# (embeddings_r, N_r) tuples are cached so resume-on-crash is cheap.
# Cached embeddings are continuous tensors (.pt files), not strings.
cache_dir: cache/pez_source_prompts/
use_cache: true

# ─── Misc ────────────────────────────────────────────────────────
seed: 42
device: cuda
dtype: float16
