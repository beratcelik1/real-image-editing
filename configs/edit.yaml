# End-to-end editing pipeline configuration
#
# Used by: src/pipeline.py edit_image()
# Wires PEZ-1, PEZ-2, DDIM inversion, P2P/PnP, LocalBlend together.

# Stable Diffusion model.
# The repo's existing src/utils.py loads SD2.1; keeping that.
sd_model: stabilityai/stable-diffusion-2-1-base

# DDIM inversion + null-text optimization (existing src/inversion.py).
ddim:
  num_steps: 50
  cfg_scale: 7.5
  null_text:
    enabled: true
    opt_steps: 10
    lr: 0.01

# P2P cross-attention controller (existing attention_control/cross_attention.py).
cross_attention:
  cross_replace_steps: 0.8  # fraction of steps with P2P injection active
  layer_indices: null       # null = all cross-attention layers; or {6,7,8} etc.

# PnP self-attention controller (existing attention_control/self_attention.py).
self_attention:
  enabled: true
  self_replace_steps: 0.5   # lower for global style changes
  layer_indices: null

# Token alignment between PEZ-1 and PEZ-2 prompts.
# "lcs" = LCS over token IDs (default, fast)
# "semantic" = CLIP-embedding-based alignment (fallback if LCS fails;
#              not implemented in basic plan, see appendix in proposal)
alignment_method: lcs

device: cuda
dtype: float16
