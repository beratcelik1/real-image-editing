# End-to-end editing pipeline configuration
#
# Used by: src/pipeline.py edit_image()
# Wires PEZ-1, PEZ-2, DDIM inversion, P2P, LocalBlend together.
#
# P2P-only by design. Self-attention injection (PnP) was scoped out
# of the project — see docs/p2p_pnp/REFERENCES.md for the rationale
# and the source of each hyperparameter default below.

# Stable Diffusion model.
# SD 1.5 (CLIP-L/14, 768-dim text encoder) — matches the SD version
# Hertz et al. (P2P) used to tune cross_replace_steps and other P2P
# defaults below. SD 2.1 swaps in OpenCLIP-H/14 (1024-dim) and is
# gated on HF (requires HF_TOKEN); switching back would break P2P
# hyperparameter transfer and re-introduce auth friction. This mirror
# org hosts the SD 1.5 weights publicly.
sd_model: stable-diffusion-v1-5/stable-diffusion-v1-5

# DDIM inversion + null-text optimization (existing src/inversion.py).
ddim:
  num_steps: 50              # Standard 50-step DDIM (matches Google P2P)
  cfg_scale: 7.5             # Standard CFG scale
  null_text:
    enabled: true
    opt_steps: 10            # Per-timestep null-text optimization steps
    lr: 0.01                 # Adam lr for null-text optimization

# P2P cross-attention controller (existing
# attention_control/cross_attention.py).
cross_attention:
  # Fraction of denoising steps with P2P injection active. Lower values
  # give the target prompt more freedom in late steps. Google's
  # canonical defaults from prompt-to-prompt_stable.ipynb (Hertz et
  # al. 2022, used here as published guidance):
  #   word swap (cat -> dog):       0.4   ← REPLACE-mode default
  #   adding tokens (+ bowtie):     0.8   ← ADD-mode default (future)
  #   re-weighting:                 1.0
  # v1 only ships REPLACE, so the default tracks Hertz's word-swap
  # recommendation. ADD-mode (R5) will need to override this to 0.8
  # when it lands. Per-edit-type tuning is also part of Knob 2's
  # ablation in the notebook (KNOB_2_GRID).
  cross_replace_steps: 0.4
  layer_indices: null         # null = all cross-attention layers
                              # (also filters self-attention if enabled)

# Plug-and-Play (Tumanyan et al. 2023) self-attention injection.
# Source's self-attention map is copied to target for the first
# `self_replace_steps` fraction of denoising. Self-attention determines
# spatial structure / texture; copying source's preserves source
# structure even as target's cross-attention drives content changes.
#
# Hertz et al. 2022 (P2P) recommend ~0.4-0.6 for word-swap edits.
# Tumanyan et al. (PnP) typically use higher values.
# Set to 0.0 to disable entirely (cross-attention-only P2P, the
# original v1 behavior). Reference implementation:
# external/plug-and-play/.
self_attention:
  self_replace_steps: 0.4

# Edit mode (RESEARCH_PROPOSAL.md §3.0). Four rule-based modes; v1
# implements only REPLACE. ADD, EXPLICIT_REPLACE, and STYLE raise
# NotImplementedError with a pointer to the proposal.
#
#   "replace"           — user input: target descriptor (e.g. "cat",
#                         "brown fur"). PEZ-2 drifts one or more
#                         existing positions toward the target.
#                         All N positions unfrozen; max prompt_length;
#                         LocalBlend DISABLED (drifted positions are
#                         region-localized via PEZ-1's optimization,
#                         no spatial gating needed). Implemented in v1.
#   "add"               — user input: object noun (e.g. "bowtie").
#                         PEZ-2 allocates K extra free slots warm-
#                         started from padding tokens; the new
#                         content lands there. LocalBlend ENABLED —
#                         this is the only mode that uses LocalBlend,
#                         to spatially gate the new content (which
#                         has no PEZ-1 spatial prior). Future (R5).
#   "explicit_replace"  — user input: (source_word, target_word) pair.
#                         System cosine-localizes the source word to
#                         a PEZ-1 position and drifts only that one.
#                         LocalBlend disabled (same reasoning as
#                         REPLACE). Future (R6).
#   "style"             — user input: style descriptor (e.g.
#                         "whimsical", "oil painting"). Same code
#                         path as REPLACE (all N drift, no LocalBlend),
#                         but different (λ, γ, cross_replace_steps)
#                         presets — calibrated for global drift
#                         instead of minimal drift. Future (R7).
mode: replace

# Per-position alignment between PEZ-1 and PEZ-2 continuous embeddings.
# Warm-start gives source/target identical length and per-position
# correspondence by construction; alignment reduces to a per-position
# cosine-similarity threshold.
#
# "cosine_threshold" = matched if cos_sim(src[i], tgt[i]) >= alignment_threshold;
#                      unmapped otherwise. Default and only supported method.
# (Legacy "lcs" / "semantic" methods removed — see RESEARCH_PROPOSAL.md
#  Appendix B for alternatives if cosine threshold proves insufficient.)
alignment_method: cosine_threshold
alignment_threshold: 0.95     # τ in RESEARCH_PROPOSAL.md §3.3.
                              # Sweep (0.90, 0.99) if alignment proves
                              # noisy on real PEZ-2 outputs.

device: cuda
dtype: float32
