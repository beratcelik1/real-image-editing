# LocalBlend: spatial gating mechanism for additive edits.
#
# ADD-mode-specific: see RESEARCH_PROPOSAL.md §3.0 and §3.3.
# LocalBlend gates the cross-attention of new (additive) content
# whose attention has no PEZ-1 spatial prior — it would otherwise
# leak across the image. REPLACE / EXPLICIT_REPLACE / STYLE modes
# disable LocalBlend (drifted positions are already region-localized
# from PEZ-1's optimization, or the edit is global and a mask
# defeats the purpose).
#
# In v1, ADD mode is not implemented — `run_p2p_edit` forces
# LocalBlend off in REPLACE mode regardless of `enabled` below.
# This config is the durable spec for when ADD mode lands (R5).
#
# Used by: attention_control/local_blend.py
# Specification: docs/p2p_pnp/ (Appendix A in RESEARCH_PROPOSAL.md)

enabled: true

# Threshold above which a patch is "inside" the edit mask.
# Applied after normalizing by mask.max().
threshold: 0.3

# Spatial side length at which the mask is computed before resampling.
# Cross-attention maps come at multiple resolutions (8, 16, 32, 64
# for SD2.1); we pick one canonical and resample on-the-fly to layers
# at other resolutions.
base_resolution: 16

# Optional morphological dilation of the binary mask, in iterations.
# Softens the mask boundary so the edit doesn't have hard edges.
dilate_iters: 1
